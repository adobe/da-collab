name = "da-collab"
workers_dev = true
compatibility_date = "2023-10-30"
main = "src/edge.js"
keep_vars = true

[dev]
port = 4711

[[migrations]]
tag = "v1" # Should be unique for each entry
# DocRoom uses the legacy KV-backed storage. Cloudflare now recommends
# new_sqlite_classes for new Durable Object namespaces (SQLite-backed DOs
# support SQL queries and 30-day point-in-time recovery). Migrating existing
# instances requires a v2 migration tag, a new class, and a data migration.
new_classes = ["DocRoom"]

# ----------------------------------------------------------------------
# production environment
[env.production]
name = "da-collab"

services = [
  { binding = "daadmin", service = "da-admin" }
]

[[env.production.durable_objects.bindings]]
name = "rooms"
class_name = "DocRoom"

[env.production.vars]
ENVIRONMENT = "production"
VERSION = "@@VERSION@@"
RETURN_STACK_TRACES = "false"

# ----------------------------------------------------------------------
# stage environment
[env.stage]
name = "da-collab-stage"

services = [
  { binding = "daadmin", service = "da-admin-stage" }
]

[[env.stage.durable_objects.bindings]]
name = "rooms"
class_name = "DocRoom"

[env.stage.vars]
ENVIRONMENT = "stage"
VERSION="@@VERSION@@-stage"
RETURN_STACK_TRACES = "false"

# ----------------------------------------------------------------------
# ci environment
[env.ci]
name = "da-collab-ci"

services = [
  { binding = "daadmin", service = "da-admin-stage" }
]

[[env.ci.durable_objects.bindings]]
name = "rooms"
class_name = "DocRoom"

[env.ci.vars]
ENVIRONMENT = "ci"
VERSION="@@VERSION@@-ci"
RETURN_STACK_TRACES = "false"

# ----------------------------------------------------------------------
# dev environment (local)
[env.dev]
name = "da-collab-local"

services = [
  { binding = "daadmin", service = "da-admin-local" }
]

[[env.dev.durable_objects.bindings]]
name = "rooms"
class_name = "DocRoom"

[env.dev.vars]
ENVIRONMENT = "dev"
VERSION="0.0.0-dev"
RETURN_STACK_TRACES = "true"
